<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Bootstrap Components</title>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">My Website</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="#">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">About</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Contact</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div class="alert alert-success">
        Welcome to Bootstrap Components Example!
    </div>

    <h3>Buttons</h3>

    <button class="btn btn-primary">Primary</button>
    <button class="btn btn-success">Success</button>
    <button class="btn btn-danger">Danger</button>

    <hr>

    <h3>Card</h3>

    <div class="card" style="width: 18rem;">
        <img src="" class="card-img-top" alt="image">

        <div class="card-body">
            <h5 class="card-title">Bootstrap Card</h5>

            <p class="card-text">
                This is a simple Bootstrap card component.
            </p>

            <a href="#" class="btn btn-primary">Read More</a>
        </div>
    </div>

    <hr>

    <h3>Form</h3>

    <form>
        <div class="mb-3">
            <label class="form-label">Email</label>

            <input type="email" class="form-control" placeholder="Enter email">
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>

            <input type="password" class="form-control" placeholder="Enter password">
        </div>

        <button type="submit" class="btn btn-success">
            Login
        </button>
    </form>

    <hr>

    
    <h3>Table</h3>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Department</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>1</td>
                <td>John</td>
                <td>IT</td>
            </tr>

            <tr>
                <td>2</td>
                <td>Mary</td>
                <td>HR</td>
            </tr>

            <tr>
                <td>3</td>
                <td>David</td>
                <td>Finance</td>
            </tr>
        </tbody>
    </table>

    <hr>

    <button class="btn btn-warning" data-bs-toggle="modal" data-bs-target="#myModal">
       
    </button>

</div>


<div class="modal fade" id="myModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Bootstrap Modal</h5>

                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                This is a Bootstrap modal popup.
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">
                    Close
                </button>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
