<!DOCTYPE html>
<html>
<head>
  <title>Frontend Events Demo</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      padding:20px;
    }

    h1{
      text-align:center;
      color:#333;
    }

    .container{
      display:grid;
      grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      margin-top:20px;
    }

    .box{
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.2);
    }

    button{
      padding:10px 20px;
      border:none;
      background:#007bff;
      color:white;
      border-radius:5px;
      cursor:pointer;
    }

    input{
      width:100%;
      padding:10px;
      margin-top:10px;
    }

    #touchBox{
      background:orange;
      color:white;
      text-align:center;
      padding:40px;
      border-radius:10px;
      margin-top:10px;
      user-select:none;
    }

    #log{
      margin-top:20px;
      background:black;
      color:lime;
      padding:15px;
      height:200px;
      overflow:auto;
      border-radius:10px;
    }
  </style>
</head>

<body>

  <h1>Frontend Events Project</h1>

  <div class="container">

    <!-- Mouse Event -->
    <div class="box">
      <h3>1. Mouse Event</h3>
      <button id="mouseBtn">Click Me</button>
    </div>

    <!-- Keyboard Event -->
    <div class="box">
      <h3>2. Keyboard Event</h3>
      <input type="text" id="keyboardInput" placeholder="Press any key">
    </div>

    <!-- Form Event -->
    <div class="box">
      <h3>3. Form Event</h3>

      <form id="myForm">
        <input type="text" placeholder="Enter Name" required>
        <br><br>
        <button type="submit">Submit</button>
      </form>
    </div>

    <!-- Window Event -->
    <div class="box">
      <h3>4. Window Event</h3>
      <p>Resize the browser window.</p>
    </div>

    <!-- Input Event -->
    <div class="box">
      <h3>5. Input Event</h3>
      <input type="text" id="liveInput" placeholder="Type something">
      <p id="liveText"></p>
    </div>

    <!-- Touch Event -->
    <div class="box">
      <h3>6. Touch Event</h3>

      <div id="touchBox">
        Touch Here
      </div>
    </div>

  </div>

  <!-- Output -->
  <div id="log">
    <h3>Event Output:</h3>
  </div>

  <script>

    const log = document.getElementById("log");

    function showMessage(message){
      log.innerHTML += "<p>" + message + "</p>";
    }

    // 1. Mouse Event
    document.getElementById("mouseBtn")
    .addEventListener("click", function(){
      showMessage("Mouse Event: Button Clicked");
    });

    // 2. Keyboard Event
    document.getElementById("keyboardInput")
    .addEventListener("keydown", function(event){
      showMessage("Keyboard Event: Key Pressed = " + event.key);
    });

    // 3. Form Event
    document.getElementById("myForm")
    .addEventListener("submit", function(event){
      event.preventDefault();
      showMessage("Form Event: Form Submitted");
    });

    // 4. Window Event
    window.addEventListener("resize", function(){
      showMessage(
        "Window Event: Window Resized to "
        + window.innerWidth + "px"
      );
    });

    // 5. Input Event
    document.getElementById("liveInput")
    .addEventListener("input", function(event){

      document.getElementById("liveText").innerText =
      "You typed: " + event.target.value;

      showMessage("Input Event: Typing...");
    });

    // 6. Touch Event
    document.getElementById("touchBox")
    .addEventListener("touchstart", function(){
      showMessage("Touch Event: Screen Touched");
    });

  </script>

</body>
</html>
